---
apiVersion: v1
kind: Namespace
metadata:
  name: quota-demo
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: mem-quota
  namespace: quota-demo
spec:
  hard:
    # During rolling update, Kubernetes will try to create 2 new pods (25% of total replica count)
    # before terminating any old ones. With this quota, it barely allows 2 surge pods (2 * 50Mi = 100Mi)
    # on top of the existing 8 replicas (8 * 50Mi = 400Mi).
    requests.memory: 500Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-v1
  namespace: quota-demo
spec:
  replicas: 8
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%      # default — Kubernetes instructed to surge 2 extra pods during rolling update
      maxUnavailable: 0  # no pod taken down until new one is Ready
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        resources:
          requests:
            memory: "50Mi" # 8 replicas * 50Mi = 400Mi used (100Mi remaining - just enough for 2 surge pods)
