---
apiVersion: v1
kind: Namespace
metadata:
  name: quota-demo
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: mem-quota
  namespace: quota-demo
spec:
  hard:
    # Not enough to surge 2 pods with 52Mi during rolling update
    requests.memory: 500Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-v1
  namespace: quota-demo
spec:
  replicas: 8
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%      # default — Kubernetes instructed to surge 2 extra pods during rolling update
      maxUnavailable: 0  # no pod taken down until new one is Ready
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        resources:
          requests:
            memory: "52Mi" # 8 replicas * 52Mi = 416Mi used (84Mi remaining - not enough for 2 surge pods)
